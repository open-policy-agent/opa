---
cases:
  - note: purlbuiltins/is_valid_npm
    query: data.generated.p = x
    modules:
      - |
        package generated
        p := x if {
          purl.is_valid("pkg:npm/foobar@12.3.1", x)
        }
    want_result:
      - x: true

  - note: purlbuiltins/is_valid_maven
    query: data.generated.p = x
    modules:
      - |
        package generated
        p := x if {
          purl.is_valid("pkg:maven/org.apache.xmlgraphics/batik-anim@1.9.1", x)
        }
    want_result:
      - x: true

  - note: purlbuiltins/is_valid_invalid
    query: data.generated.p = x
    modules:
      - |
        package generated
        p := x if {
          purl.is_valid("not-a-purl", x)
        }
    want_result:
      - x: false

  - note: purlbuiltins/is_valid_empty
    query: data.generated.p = x
    modules:
      - |
        package generated
        p := x if {
          purl.is_valid("", x)
        }
    want_result:
      - x: false
