# Lychee configuration for checking the repository (excluding docs/)

no_progress = true
max_concurrency = 1
max_retries = 1
retry_wait_time = 5
accept = ["200..=206", "403", "429"]
scheme = ["https", "http"]

exclude_path = [
    # docs is tested with the website.toml config instead
    'docs',

    'vendor',
    'internal',
    'CHANGELOG\.md',
]
